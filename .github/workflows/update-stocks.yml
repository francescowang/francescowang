name: Update Stocks

on:
  schedule:
    - cron: "15 */6 * * *"  # Every 6 hours at :15 (after weather at :00)
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/update_stocks_only.py"
      - "scripts/update_base.py"
concurrency:
  group: readme-push
  cancel-in-progress: false
jobs:
  test:
    if: github.event_name != 'schedule'
    name: Run test suite
    uses: ./.github/workflows/run-tests.yml

  update-stocks:
    name: Update stocks section
    needs: [test]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || success()
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Pull latest changes
        run: git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update stocks
        run: python -m scripts.update_stocks_only

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if ! git diff --quiet; then
            git add README.md
            git commit -m "chore: update stocks"
            for i in 1 2 3 4 5; do
              git push && break
              echo "Push attempt $i failed — rebasing on origin/main..."
              git pull --rebase origin main
              sleep $((i * 3))
            done
          fi
