name: Update Weather

on:
  schedule:
    - cron: "0 */3 * * *"  # Every 3 hours
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/update_weather_only.py"
      - "scripts/update_base.py"
      - "providers/weather.py"
concurrency:
  group: readme-push
  cancel-in-progress: false
jobs:
  test:
    name: Run test suite
    uses: ./.github/workflows/run-tests.yml

  update-weather:
    name: Update weather section
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Pull latest changes
        run: git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update weather
        run: python -m scripts.update_weather_only

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if ! git diff --quiet; then
            git add README.md
            git commit -m "chore: update weather"
            for i in 1 2 3 4 5; do
              git push && break
              echo "Push attempt $i failed — rebasing on origin/main..."
              git pull --rebase origin main
              sleep $((i * 3))
            done
          fi
