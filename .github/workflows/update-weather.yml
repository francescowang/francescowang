name: Update Weather

on:
  schedule:
    - cron: "0 */3 * * *"  # Every 3 hours
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "update_weather_only.py"
      - "providers/weather.py"
concurrency:
  group: readme-push
  cancel-in-progress: false
jobs:
  test:
    name: Run test suite
    uses: ./.github/workflows/run-tests.yml

  update-weather:
    name: Update weather section
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update weather
        run: python update_weather_only.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git diff --quiet || (git add README.md && git commit -m "chore: update weather" && git pull --rebase && git push)
